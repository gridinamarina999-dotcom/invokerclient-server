{% extends "base.html" %}
{% block title %}Повторная отправка — InvokerClient{% endblock %}

{% block content %}
<section class="auth-section">
  <form class="auth-form" method="post" action="{{ url_for('resend_verification') }}" novalidate>
    <h1>Отправить письмо снова</h1>
    <p class="form-lead">Укажите почту, на которую регистрировались.</p>

    <label>
      Почта
      <input type="email" name="email" required autocomplete="email" />
    </label>

    <button class="btn btn-primary" type="submit">Отправить</button>
    <p class="form-alt"><a href="{{ url_for('login') }}">Назад ко входу</a></p>
  </form>
</section>
{% endblock %}
