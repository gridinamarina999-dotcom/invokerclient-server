{% extends "base.html" %}
{% block title %}Вход — InvokerClient{% endblock %}

{% block content %}
<section class="auth-section">
  <form class="auth-form" method="post" action="{{ url_for('login') }}" novalidate>
    <h1>Вход</h1>
    <p class="form-lead">Войдите по почте и паролю после подтверждения.</p>

    <label>
      Почта
      <input type="email" name="email" required autocomplete="email" />
    </label>

    <label>
      Пароль
      <div class="password-field">
        <input id="login-password" type="password" name="password" required autocomplete="current-password" />
        <button type="button" class="password-toggle" data-password-toggle="login-password" aria-label="Показать пароль">Показать</button>
      </div>
    </label>

    <button class="btn btn-primary" type="submit">Войти</button>
    <p class="form-alt">Нет аккаунта? <a href="{{ url_for('register') }}">Регистрация</a></p>
    <p class="form-alt">Не пришло письмо? <a href="{{ url_for('resend_verification') }}">Отправить снова</a></p>
  </form>
</section>
{% endblock %}
