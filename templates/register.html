{% extends "base.html" %}
{% block title %}Регистрация — InvokerClient{% endblock %}

{% block content %}
<section class="auth-section">
  <form class="auth-form" method="post" action="{{ url_for('register') }}" novalidate>
    <h1>Регистрация</h1>
    <p class="form-lead">Укажите почту и пароль. Затем подтвердите адрес из письма.</p>

    <label>
      Почта
      <input type="email" name="email" required autocomplete="email" placeholder="you@example.com" />
    </label>

    <label>
      Пароль
      <div class="password-field">
        <input id="reg-password" type="password" name="password" required minlength="6" autocomplete="new-password" />
        <button type="button" class="password-toggle" data-password-toggle="reg-password" aria-label="Показать пароль">Показать</button>
      </div>
    </label>

    <label>
      Повтор пароля
      <div class="password-field">
        <input id="reg-password2" type="password" name="password2" required minlength="6" autocomplete="new-password" />
        <button type="button" class="password-toggle" data-password-toggle="reg-password2" aria-label="Показать пароль">Показать</button>
      </div>
    </label>

    <button class="btn btn-primary" type="submit">Зарегистрироваться</button>
    <p class="form-alt">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
  </form>
</section>
{% endblock %}
